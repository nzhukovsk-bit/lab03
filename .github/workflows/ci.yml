name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
            name: Linux (gcc)
            exe_suffix: ""
          
          - os: ubuntu-latest
            compiler: clang++
            name: Linux (clang)
            exe_suffix: ""
            install_cmd: sudo apt-get update && sudo apt-get install -y clang
          
          - os: windows-latest
            name: Windows (MSVC)
            exe_suffix: .exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install compiler dependencies
        if: matrix.install_cmd != ''
        run: ${{ matrix.install_cmd }}
      
      - name: Configure CMake
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake -B build
          else
            cmake -B build -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
          fi
        shell: bash
      
      - name: Build
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake --build build --config Release
          else
            cmake --build build
          fi
        shell: bash
      
      - name: Set executable permissions (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x build/hello_world/hello_world
          chmod +x build/solver/solver
        shell: bash
      
      - name: Run hello_world
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build/hello_world/Release/hello_world${{ matrix.exe_suffix }}
          else
            ./build/hello_world/hello_world${{ matrix.exe_suffix }}
          fi
        shell: bash
      
      - name: Run solver
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "1 -3 2" | ./build/solver/Release/solver${{ matrix.exe_suffix }}
          else
            echo "1 -3 2" | ./build/solver/solver${{ matrix.exe_suffix }}
          fi
        shell: bash
