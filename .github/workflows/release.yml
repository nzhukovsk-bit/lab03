name: Create Release and Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential rpm

      - name: Build and Package
        run: |
          mkdir build && cd build
          cmake ..
          cmake --build .
          cpack --config CPackConfig.cmake

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2  # Обновлено с v1 на v2
        with:
          files: |
            build/*.deb
            build/*.rpm
            build/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
